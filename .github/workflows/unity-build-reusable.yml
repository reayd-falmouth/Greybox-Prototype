# Reusable Unity builds + optional store releases (pattern: MasterBlaster1994).
# Unity project lives in ./Unity — all game-ci steps use projectPath: Unity

name: Unity Build Reusable

on:
  workflow_call:
    inputs:
      do_release:
        description: Run Itch.io, TestFlight, and Play internal jobs after builds
        required: false
        type: boolean
        default: false
      release_version:
        description: Version label for Itch.io uploads
        required: false
        type: string
        default: ""
      source_run_id:
        description: Existing CI run ID to source artifacts from (skip local builds when set)
        required: false
        type: string
        default: ""
      source_build_sha:
        description: Commit SHA to resolve latest successful build artifacts from
        required: false
        type: string
        default: ""
      s3_artifact_prefix:
        description: Prefix in S3 bucket for CI artifacts
        required: false
        type: string
        default: "ci-artifacts/"
    secrets:
      UNITY_LICENSE:
        required: true
      UNITY_EMAIL:
        required: true
      UNITY_PASSWORD:
        required: true
      ITCHIO_API_KEY:
        required: false
      APPLE_CONNECT_EMAIL:
        required: false
      APPLE_DEVELOPER_EMAIL:
        required: false
      APPLE_TEAM_ID:
        required: false
      APPSTORE_ISSUER_ID:
        required: false
      APPSTORE_KEY_ID:
        required: false
      APPSTORE_P8:
        required: false
      IOS_BUNDLE_ID:
        required: false
      ANDROID_PACKAGE_NAME:
        required: false
      PROJECT_NAME:
        required: false
      MATCH_S3_BUCKET:
        required: false
      MATCH_S3_REGION:
        required: false
      GOOGLE_PLAY_KEY_FILE:
        required: false
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASS:
        required: false
      ANDROID_KEYALIAS_NAME:
        required: false
      ANDROID_KEYALIAS_PASS:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ITCHIO_USER: ${{ vars.ITCHIO_USER }}
  ITCH_PROJECT: ${{ vars.ITCH_PROJECT }}
  S3_ARTIFACT_BUCKET: ${{ vars.S3_THIRDPARTY_BUCKET || 'greybox-prototype-unity-3rdparty-assets-eu-west-1-093581297635' }}
  S3_ARTIFACT_PREFIX: ${{ inputs.s3_artifact_prefix }}

jobs:
  build_mac:
    if: inputs.source_run_id == '' && inputs.source_build_sha == ''
    name: ${{ format('Build ({0} | {1}) on macOS', matrix.targetPlatform, matrix.artifactName) }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # - targetPlatform: Android
          #   artifactName: Android
          - targetPlatform: StandaloneOSX
            artifactName: macOS
          - targetPlatform: iOS
            artifactName: iOS
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup third-party assets from S3
        uses: ./.github/actions/setup-thirdparty-assets
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.S3_THIRDPARTY_REGION || 'eu-west-1' }}
          s3-bucket: ${{ vars.S3_THIRDPARTY_BUCKET || 'greybox-prototype-unity-3rdparty-assets-eu-west-1-093581297635' }}
          s3-object-key: ${{ vars.S3_THIRDPARTY_OBJECT_KEY || 'thirdparty-ci.zip' }}

      - name: Patch third-party asmdefs (Cinemachine, EngineCore)
        shell: bash
        run: python3 scripts/ci/patch_thirdparty_asmdefs.py

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: Unity/Library
          key: Library-${{ runner.os }}-${{ hashFiles('Unity/Assets/**', 'Unity/Packages/**', 'Unity/ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-

      - name: Build project (non-Android)
        if: matrix.targetPlatform != 'Android'
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Unity
          targetPlatform: ${{ matrix.targetPlatform }}
          allowDirtyBuild: true
          buildName: GreyboxPrototype

      - name: Build project (Android)
        if: matrix.targetPlatform == 'Android'
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Unity
          targetPlatform: Android
          allowDirtyBuild: true
          buildName: GreyboxPrototype
          androidExportType: androidAppBundle
          androidKeystoreName: upload.keystore
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}

      - name: Upload Unity Editor.log (macOS)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: unity-editor-log-${{ matrix.artifactName }}
          path: /Users/runner/Library/Logs/Unity/Editor.log
          if-no-files-found: warn

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifactName }}
          path: build

      - name: Upload build artifact to S3
        shell: bash
        run: |
          set -euo pipefail
          ART="${{ matrix.artifactName }}"
          KEY_BASE="${S3_ARTIFACT_PREFIX}${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}/${ART}"
          ARCHIVE="${RUNNER_TEMP}/${ART}.tar.gz"
          tar -czf "${ARCHIVE}" -C build .
          aws s3 cp "${ARCHIVE}" "s3://${S3_ARTIFACT_BUCKET}/${KEY_BASE}/bundle.tar.gz"
          python3 - <<'PY' > "${RUNNER_TEMP}/metadata.json"
          import json, os
          print(json.dumps({
            "repository": os.getenv("GITHUB_REPOSITORY"),
            "run_id": os.getenv("GITHUB_RUN_ID"),
            "sha": os.getenv("GITHUB_SHA"),
            "ref": os.getenv("GITHUB_REF_NAME"),
            "workflow": os.getenv("GITHUB_WORKFLOW"),
            "platform": os.getenv("ART"),
            "artifact_name": os.getenv("ART"),
            "release_version": os.getenv("RELEASE_VERSION", ""),
          }))
          PY
          aws s3 cp "${RUNNER_TEMP}/metadata.json" "s3://${S3_ARTIFACT_BUCKET}/${KEY_BASE}/metadata.json"
        env:
          ART: ${{ matrix.artifactName }}
          RELEASE_VERSION: ${{ inputs.release_version }}

  # StandaloneWindows64 on hosted macOS (Apple Silicon) is unsupported by game-ci Unity Hub.
  # Use Ubuntu + Linux editor container for Windows builds and strip NiceVibrations sample .haptic assets
  # that rely on editor plugins unavailable on Linux.
  build_windows:
    if: inputs.source_run_id == '' && inputs.source_build_sha == ''
    name: Build (StandaloneWindows64 | Windows) on Ubuntu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Setup third-party assets from S3
        uses: ./.github/actions/setup-thirdparty-assets
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.S3_THIRDPARTY_REGION || 'eu-west-1' }}
          s3-bucket: ${{ vars.S3_THIRDPARTY_BUCKET || 'greybox-prototype-unity-3rdparty-assets-eu-west-1-093581297635' }}
          s3-object-key: ${{ vars.S3_THIRDPARTY_OBJECT_KEY || 'thirdparty-ci.zip' }}

      - name: Patch third-party asmdefs (Cinemachine, EngineCore)
        shell: bash
        run: python3 scripts/ci/patch_thirdparty_asmdefs.py

      - name: Remove NiceVibrations HapticSamples on Linux
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "Unity/Assets/3rdParty/Feel/NiceVibrations/HapticSamples" \
                 "Unity/Assets/3rdParty/Feel/NiceVibrations/HapticSamples.meta"

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: Unity/Library
          key: Library-${{ runner.os }}-Windows-${{ hashFiles('Unity/Assets/**', 'Unity/Packages/**', 'Unity/ProjectSettings/**') }}
          restore-keys: |
            Library-${{ runner.os }}-Windows-
            Library-${{ runner.os }}-

      - name: Build project (Windows)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: Unity
          targetPlatform: StandaloneWindows64
          allowDirtyBuild: true
          buildName: GreyboxPrototype

      - name: Upload Unity Editor.log (Ubuntu)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: unity-editor-log-Windows
          path: |
            Unity/*.log
            **/Editor.log
          if-no-files-found: warn

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: Windows
          path: build

      - name: Upload build artifact to S3
        shell: bash
        run: |
          set -euo pipefail
          ART="Windows"
          KEY_BASE="${S3_ARTIFACT_PREFIX}${GITHUB_REPOSITORY}/${GITHUB_RUN_ID}/${ART}"
          ARCHIVE="${RUNNER_TEMP}/${ART}.tar.gz"
          tar -czf "${ARCHIVE}" -C build .
          aws s3 cp "${ARCHIVE}" "s3://${S3_ARTIFACT_BUCKET}/${KEY_BASE}/bundle.tar.gz"
          python3 - <<'PY' > "${RUNNER_TEMP}/metadata.json"
          import json, os
          print(json.dumps({
            "repository": os.getenv("GITHUB_REPOSITORY"),
            "run_id": os.getenv("GITHUB_RUN_ID"),
            "sha": os.getenv("GITHUB_SHA"),
            "ref": os.getenv("GITHUB_REF_NAME"),
            "workflow": os.getenv("GITHUB_WORKFLOW"),
            "platform": "Windows",
            "artifact_name": "Windows",
            "release_version": os.getenv("RELEASE_VERSION", ""),
          }))
          PY
          aws s3 cp "${RUNNER_TEMP}/metadata.json" "s3://${S3_ARTIFACT_BUCKET}/${KEY_BASE}/metadata.json"
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}

  release_itch:
    name: Release desktop builds to Itch.io
    if: always() && inputs.do_release && vars.ITCHIO_USER != '' && vars.ITCH_PROJECT != ''
    needs: [build_mac, build_windows]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifactName: Windows
            channel: windows
          - artifactName: macOS
            channel: mac
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.S3_THIRDPARTY_REGION || 'eu-west-1' }}

      - name: Resolve source run id
        id: resolve_run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.source_run_id }}" ]; then
            echo "run_id=${{ inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${{ inputs.source_build_sha }}" ]; then
            RID="$(gh run list --limit 50 --json databaseId,headSha,workflowName,status,conclusion --jq '.[] | select(.headSha=="${{ inputs.source_build_sha }}" and .status=="completed" and .conclusion=="success" and (.workflowName=="Build" or .workflowName=="Build and release")) | .databaseId' | head -n1)"
            if [ -n "${RID}" ]; then
              echo "run_id=${RID}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Unable to resolve source run for sha ${{ inputs.source_build_sha }}" >&2
            exit 1
          fi
          echo "run_id=${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download ${{ matrix.artifactName }} artifact from S3
        id: s3_download
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          ART="${{ matrix.artifactName }}"
          RUN_ID="${{ steps.resolve_run.outputs.run_id }}"
          KEY="s3://${S3_ARTIFACT_BUCKET}/${S3_ARTIFACT_PREFIX}${GITHUB_REPOSITORY}/${RUN_ID}/${ART}/bundle.tar.gz"
          ARCHIVE="${RUNNER_TEMP}/${ART}.tar.gz"
          aws s3 cp "${KEY}" "${ARCHIVE}"
          mkdir -p "${ART}"
          tar -xzf "${ARCHIVE}" -C "${ART}"

      - name: Download ${{ matrix.artifactName }} artifact (GitHub fallback)
        if: steps.s3_download.outcome == 'failure'
        uses: actions/download-artifact@v6
        with:
          name: ${{ matrix.artifactName }}
          path: ${{ matrix.artifactName }}

      - name: Deploy ${{ matrix.artifactName }} to Itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: ${{ matrix.artifactName }}
          project: ${{ env.ITCHIO_USER }}/${{ env.ITCH_PROJECT }}
          channel: ${{ matrix.channel }}
          version: ${{ inputs.release_version != '' && inputs.release_version || github.ref_name }}
          api-key: ${{ secrets.ITCHIO_API_KEY }}

  ios_testflight:
    name: Publish iOS to TestFlight
    if: always() && inputs.do_release
    needs: [build_mac]
    runs-on: macos-15
    env:
      IOS_BUILD_PATH: ${{ format('{0}/build/iOS/GreyboxPrototype', github.workspace) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.S3_THIRDPARTY_REGION || 'eu-west-1' }}

      - name: Resolve source run id
        id: resolve_run
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.source_run_id }}" ]; then
            echo "run_id=${{ inputs.source_run_id }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "${{ inputs.source_build_sha }}" ]; then
            RID="$(gh run list --limit 50 --json databaseId,headSha,workflowName,status,conclusion --jq '.[] | select(.headSha=="${{ inputs.source_build_sha }}" and .status=="completed" and .conclusion=="success" and (.workflowName=="Build" or .workflowName=="Build and release")) | .databaseId' | head -n1)"
            if [ -n "${RID}" ]; then
              echo "run_id=${RID}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Unable to resolve source run for sha ${{ inputs.source_build_sha }}" >&2
            exit 1
          fi
          echo "run_id=${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Download iOS artifact from S3
        id: s3_download_ios
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="${{ steps.resolve_run.outputs.run_id }}"
          KEY="s3://${S3_ARTIFACT_BUCKET}/${S3_ARTIFACT_PREFIX}${GITHUB_REPOSITORY}/${RUN_ID}/iOS/bundle.tar.gz"
          ARCHIVE="${RUNNER_TEMP}/iOS.tar.gz"
          aws s3 cp "${KEY}" "${ARCHIVE}"
          mkdir -p build
          tar -xzf "${ARCHIVE}" -C build

      - name: Download iOS artifact (GitHub fallback)
        if: steps.s3_download_ios.outcome == 'failure'
        uses: actions/download-artifact@v6
        with:
          name: iOS
          path: build

      - name: Install CocoaPods
        run: |
          cd "$IOS_BUILD_PATH"
          if [ -f "Podfile" ]; then
            pod install --repo-update
          else
            echo "No Podfile found, skipping pod install."
          fi

      - name: List Xcode projects under build (diagnostic)
        run: |
          find build -name "*.xcodeproj" -maxdepth 8 2>/dev/null || true
          find build -name "*.xcworkspace" -maxdepth 8 2>/dev/null || true

      - name: Build and upload TestFlight with fastlane
        env:
          APPLE_CONNECT_EMAIL: ${{ secrets.APPLE_CONNECT_EMAIL }}
          APPLE_DEVELOPER_EMAIL: ${{ secrets.APPLE_DEVELOPER_EMAIL }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_P8: ${{ secrets.APPSTORE_P8 }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          MATCH_S3_BUCKET: ${{ secrets.MATCH_S3_BUCKET }}
          MATCH_S3_REGION: ${{ secrets.MATCH_S3_REGION }}
        run: |
          sudo xcode-select --switch /Applications/Xcode_16.4.app
          bundle exec fastlane ios beta

      - name: Upload iOS publish logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: ios-testflight-logs
          path: |
            fastlane/logs
            fastlane/report.xml
            ~/Library/Logs/gym
            ~/Library/Logs/scan
          if-no-files-found: warn

  android_play:
    name: Publish Android to Google Play (internal)
    # Temporarily disabled while Android build artifact generation is being reworked.
    if: false
    needs: [build_mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Android artifact
        uses: actions/download-artifact@v6
        with:
          name: Android
          path: build

      - name: Write Play credentials
        run: |
          echo "$GOOGLE_PLAY_KEY_FILE" > fastlane/credentials.json
        env:
          GOOGLE_PLAY_KEY_FILE: ${{ secrets.GOOGLE_PLAY_KEY_FILE }}

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Upload to Play (internal track)
        env:
          ANDROID_PACKAGE_NAME: ${{ secrets.ANDROID_PACKAGE_NAME }}
        run: bundle exec fastlane android internal

      - name: Upload Android publish logs on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: android-play-logs
          path: |
            fastlane/logs
            fastlane/report.xml
          if-no-files-found: warn
